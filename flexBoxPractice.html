<!doctype html>
<html>
  <head>
    <title>Flex Box Practice</title>
    <link rel="stylesheet" href="flexBoxPractice.css" />
  </head>
  <body>
    <div class="profile-container">
      <div class="profile-box-flex">
        <div class="profile-picture">
          <img class="cat-image" src="images/cat.jpg" />
        </div>
        <div class="profile-info">
          <p class="cat-name">Oliver</p>
          <p class="cat-info">the cat</p>
          <p class="cat-status">Popular</p>
        </div>
        <div class="profile-follow">
          <button class="profile-follow-btn">Follow</button>
        </div>
      </div>

      <div class="profile-box-flex">
        <div class="profile-picture">
          <img class="cat-image" src="images/cat2.jpg" />
        </div>
        <div class="profile-info">
          <p class="cat-name">Mimi</p>
          <p class="cat-info">Sleepy cat</p>
          <p class="cat-status">Popular</p>
        </div>
        <div class="profile-follow">
          <button class="profile-follow-btn">Follow</button>
        </div>
      </div>

      <div class="profile-box-flex">
        <div class="profile-picture">
          <img class="cat-image" src="images/dog.jpg" />
        </div>
        <div class="profile-info">
          <p class="cat-name">Rex</p>
          <p class="cat-info">Happy Bulldog</p>
          <p class="cat-status">Popular</p>
        </div>
        <div class="profile-follow">
          <button class="profile-follow-btn">Follow</button>
        </div>
      </div>
    </div>
  </body>
</html>
