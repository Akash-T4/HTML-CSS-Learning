<!doctype html>
<html>
  <head>
    <title>Flex Box Practice</title>
    <link rel="stylesheet" href="flexBox.css" />
  </head>
  <body style="padding-bottom: 1000px">
    <div style="display: flex; flex-direction: row; margin-bottom: 20px">
      <div style="background-color: lightblue; width: 200px">200px</div>
      <div style="background-color: lightpink; width: 75px">75px</div>
    </div>

    <div style="display: flex; flex-direction: row; margin-bottom: 20px">
      <div style="background-color: lightblue; width: 50px">Item1</div>
      <div style="background-color: lightpink; flex: 1">Item2</div>
      <div style="background-color: lightblue; width: 75px">Item3</div>
    </div>

    <div
      style="
        display: flex;
        flex-direction: row;
        margin-bottom: 20px;
        justify-content: space-between;
      "
    >
      <div style="background-color: lightblue; width: 100px">Item1</div>
      <div style="background-color: lightpink; width: 100px">Item2</div>
      <div style="background-color: lightblue; width: 100px">Item3</div>
      <div style="background-color: lightpink; width: 100px">Item4</div>
    </div>

    <div
      style="
        display: flex;
        flex-direction: row;
        height: 100px;
        border-width: 1px;
        border-style: solid;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      "
    >
      <div style="background-color: lightblue; width: 100px">Item1</div>
      <div style="background-color: lightpink; width: 100px">Item2</div>
    </div>

    <div class="header-bar">
      <div class="left-section">
        <p class="home">Home</p>
      </div>
      <div class="middle-section">
        <input class="search-bar" type="text" placeholder="Search" />
      </div>
      <div class="right-section">
        <button class="download-button">Download</button>
      </div>
    </div>

    <div
      style="
        border-width: 1px;
        border-style: solid;
        width: 500px;
        padding: 10px;
      "
    >
      <div class="message-info">
        <div class="message">Home</div>
        <div class="message-count">14</div>
      </div>
      <div class="message-info">
        <div class="message">Notifications</div>
        <div class="message-count">3</div>
      </div>
      <div class="message-info">
        <div class="message">Messages</div>
        <div class="message-count">5</div>
      </div>
    </div>
  </body>
</html>
