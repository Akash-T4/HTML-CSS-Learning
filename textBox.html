<!doctype html>
<html>
  <head>
    <title>Text Box Practice</title>
    <link rel="stylesheet" href="textBox.css" />
  </head>
  <body>
    <input class="search-bar" type="text" placeholder="Search" />

    <input
      class="google-search-bar"
      type="text"
      placeholder="Search Google or type a URL"
    />

    <p class="email">Email</p>
    <input class="linkedIn-search-bar" type="text" />
    <p class="linkedIn-policy">
      By clicking Agree & Join, you agree tp the Privacy Policy.
    </p>
    <button class="linkedIn-join">Agree & Join</button>

    <div class="tweet-box">
      <img class="cat-image" src="images/cat.jpg" />
      <input
        class="tweet-input-box"
        type="text"
        placeholder="What's happening ?"
      />
      <button class="tweet-button">Tweet</button>
    </div>

    <p class="space-between"></p>
    <p class="survey-question">
      Thanks for chatting with our customer support. Would you like to take our
      quick survey ?
    </p>
    <button class="survey-question-yes-btn">Yes</button>
    <button class="survey-question-no-btn">No</button>

    <p class="space-between"></p>
    <input class="signup-first-name" type="text" placeholder="First name" />
    <input class="signup-last-name" type="text" placeholder="Last name" />
    <input class="signup-email" type="text" placeholder="Email" />
    <button class="signup-button">Sign Up</button>

    <p class="uber-request">Request a ride now</p>
    <input
      class="uber-pickup-loc"
      type="text"
      placeholder="Enter Pickup location"
    />
    <input
      class="uber-destination-loc"
      type="text"
      placeholder="Enter destination"
    />
    <button class="uber-request-button">Request now</button>
    <button class="uber-schedule-button">Schedule for later</button>
  </body>
</html>
