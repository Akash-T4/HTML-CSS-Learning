<!doctype html>
<html>
  <head>
    <title>Div Container Practice</title>
    <link rel="stylesheet" href="divContainer.css" />
  </head>
  <body>
    <div class="red-box"></div>

    <div class="green-box"></div>

    <div class="review-popup">
      <p class="review-popup-msg">Satisfied with our service ?</p>
      <button>Yes</button>
      <button>No</button>
    </div>

    <div class="youtube-music-install">
      <p class="youtube-music-install-title">Install YouTube Music</p>
      <p class="youtube-music-install-info">
        Add YouTube Music to your desktop for quick and easy access
      </p>
    </div>

    <div class="profile-box">
      <img class="cat-image" src="images/cat.jpg" />
      <p class="cat-name">Oliver</p>
      <p class="cat-friends-count">2 mutual friends</p>
      <button class="cat-add-friend-btn">Add Friend</button>
    </div>

    <div class="profile-box">
      <img class="cat-image" src="images/cat2.jpg" />
      <p class="cat-name">Mimi</p>
      <p class="cat-friends-count">3 mutual friends</p>
      <button class="cat-add-friend-btn">Add Friend</button>
    </div>

    <div class="profile-box">
      <img class="cat-image" src="images/dog.jpg" />
      <p class="cat-name">Rex</p>
      <p class="cat-friends-count">4 mutual friends</p>
      <button class="cat-add-friend-btn">Add Friend</button>
    </div>

    <div class="google-box">
      <div>
        <img class="google-image" src="images/Google.png" />
      </div>
      <div>
        <input
          class="google-search-bar"
          type="text"
          placeholder="Search Google or type a URL"
        />
      </div>
      <div>
        <button class="google-search-btn">Google Search</button>
        <button class="google-feeling-lucky-btn">I'm Feeling Lucky</button>
      </div>
    </div>
  </body>
</html>
